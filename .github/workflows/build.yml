name: Build APK
on: [push]
jobs:
 build:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4
 
 - name: Set up JDK 17
 uses: actions/setup-java@v4
 with:
 java-version: '17'
 distribution: 'temurin'
 
 - name: Cache Gradle
 uses: actions/cache@v4
 with:
 path: |
 ~/.gradle/caches
 ~/.gradle/wrapper
 key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
 restore-keys: |
 ${{ runner.os }}-gradle-
 
 - name: Grant execute permission
 run: chmod +x gradlew
 
 - name: Clean before build
 run: ./gradlew clean --no-daemon
 
 - name: Build Debug APK
 run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
 
 - name: Build Release APK (unsigned for CI)
 run: ./gradlew :app:assembleRelease --no-daemon --stacktrace || echo "Release build may require signing key"
 continue-on-error: true
 
 - name: Upload Debug APK
 uses: actions/upload-artifact@v4
 with:
 name: app-debug
 path: app/build/outputs/apk/debug/app-debug.apk
 
 - name: Upload Release APK (if exists)
 uses: actions/upload-artifact@v4
 if: hashFiles('app/build/outputs/apk/release/app-release-unsigned.apk') != ''
 with:
 name: app-release-unsigned
 path: app/build/outputs/apk/release/app-release-unsigned.apk
